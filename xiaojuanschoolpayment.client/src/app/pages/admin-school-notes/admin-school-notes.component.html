<div>设置描述</div>
<form
  [formGroup]="schoolNotesForm"
  (ngSubmit)="submit()"
  style="max-width: 400px; margin: 50px auto"
>
  <mat-form-field appearance="fill" style="width: 100%">
    <mat-label>学校</mat-label>
    <mat-select formControlName="schoolId">
      <mat-option *ngFor="let school of schoolDtos" [value]="school.id">
        {{ school.name }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="fill" style="width: 100%">
    <mat-label>描述</mat-label>
    <textarea
      matInput
      placeholder="描述"
      formControlName="note"
      rows="3"
    ></textarea>
  </mat-form-field>

  <button
    mat-raised-button
    color="primary"
    type="submit"
    [disabled]="schoolNotesForm.invalid"
  >
    提交
  </button>
</form>

<mat-divider class="my-10"></mat-divider>

<div style="max-width: 900px; margin: 0 auto">
  <div
    style="display: flex; align-items: center; gap: 16px; margin-bottom: 12px"
  >
    <h3 style="margin: 0">描述列表</h3>

    <mat-form-field
      appearance="outline"
      style="margin-left: auto; width: 260px"
    >
      <mat-label>搜索描述</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="输入学费名…" />
    </mat-form-field>
  </div>

  <div *ngIf="dataSource.data.length === 0; else roomsTable">
    <p style="text-align: center; margin-top: 20px">暂无描述数据</p>
  </div>
  <ng-template #roomsTable>
    <table mat-table [dataSource]="dataSource" matSort matSortDisableClear>
      <ng-container matColumnDef="schoolName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>学校</th>
        <td mat-cell *matCellDef="let row">{{ row.schoolName }}</td>
      </ng-container>

      <ng-container matColumnDef="note">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>描述</th>
        <td mat-cell *matCellDef="let row">{{ row.notes }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>操作</th>
        <td mat-cell *matCellDef="let row">
          <button mat-stroked-button color="primary" (click)="edit(row)">
            编辑
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [pageSize]="10"
      [pageSizeOptions]="[5, 10, 25, 50]"
      showFirstLastButtons
    >
    </mat-paginator
  ></ng-template>
</div>
