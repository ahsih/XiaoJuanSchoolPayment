<div>设置学校课程</div>
<form
  [formGroup]="schoolLessonsForm"
  (ngSubmit)="submit()"
  style="max-width: 400px; margin: 50px auto"
>
  <mat-form-field appearance="fill" style="width: 100%">
    <mat-label>学校（选一个链接到这课程）</mat-label>
    <mat-select formControlName="schoolId">
      <mat-option *ngFor="let school of schoolDtos" [value]="school.id">
        {{ school.name }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="fill" style="width: 100%">
    <mat-label>课程名字</mat-label>
    <input matInput placeholder="课程名字" formControlName="name" />
  </mat-form-field>

  <mat-form-field appearance="fill" style="width: 100%">
    <mat-label>周期</mat-label>
    <input matInput type="number" placeholder="周期" formControlName="week" />
  </mat-form-field>

  <mat-form-field appearance="fill" style="width: 100%">
    <mat-label>价格</mat-label>
    <input matInput type="number" placeholder="价格" formControlName="price" />
  </mat-form-field>

  <mat-form-field appearance="fill" style="width: 100%">
    <mat-label>价格单位</mat-label>
    <mat-select formControlName="currencyId">
      <mat-option *ngFor="let currency of currencyDtos" [value]="currency.id">
        {{ currency.symbol }} {{ currency.currencyCode }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="fill" style="width: 100%">
    <mat-label>描述</mat-label>
    <textarea
      matInput
      placeholder="描述"
      formControlName="description"
      rows="3"
    ></textarea>
  </mat-form-field>

  <mat-form-field appearance="fill" style="width: 100%">
    <mat-label>便条</mat-label>
    <textarea
      matInput
      placeholder="便条"
      formControlName="note"
      rows="3"
    ></textarea>
  </mat-form-field>

  <button
    mat-raised-button
    color="primary"
    type="submit"
    [disabled]="schoolLessonsForm.invalid"
  >
    提交
  </button>
</form>

<mat-divider class="my-10"></mat-divider>

<div style="max-width: 900px; margin: 0 auto">
  <div
    style="display: flex; align-items: center; gap: 16px; margin-bottom: 12px"
  >
    <h3 style="margin: 0">课程列表</h3>

    <mat-form-field
      appearance="outline"
      style="margin-left: auto; width: 260px"
    >
      <mat-label>搜索课程</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="输入课程名…" />
    </mat-form-field>
  </div>

  <div *ngIf="dataSource.data.length === 0; else lessonsTable">
    <p style="text-align: center; margin-top: 20px">暂无课程数据</p>
  </div>
  <ng-template #lessonsTable>
    <table mat-table [dataSource]="dataSource" matSort matSortDisableClear>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>课程名字</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="week">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>周期</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>操作</th>
        <td mat-cell *matCellDef="let row">
          <button mat-stroked-button color="primary" (click)="edit(row)">
            编辑
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [pageSize]="10"
      [pageSizeOptions]="[5, 10, 25, 50]"
      showFirstLastButtons
    >
    </mat-paginator
  ></ng-template>
</div>
