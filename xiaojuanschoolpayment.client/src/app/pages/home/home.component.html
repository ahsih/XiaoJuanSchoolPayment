<div class="container">
  <h2>School Setup</h2>

  <form [formGroup]="schoolForm" class="grid">
    <!-- School -->
    <mat-form-field appearance="fill">
      <mat-label>School</mat-label>
      <mat-select formControlName="schoolId">
        <mat-option value="">Select a school</mat-option>
        <mat-option *ngFor="let s of schools" [value]="s.id">
          {{ s.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!--Lessons-->
    <mat-form-field *ngIf="" appearance="fill">
      <mat-label>Lesson</mat-label>
      <mat-select
        formControlName="lessonId"
        [disabled]="schoolLessons.length === 0"
      >
        <mat-option value="">Select a lesson</mat-option>
        <mat-option *ngFor="let l of schoolLessons" [value]="l.id">
          {{ l.name }}
          <span *ngIf="l.price"> ({{ l.price }})</span>
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Rooms -->
    <mat-form-field appearance="fill">
      <mat-label>School Room</mat-label>
      <mat-select
        formControlName="roomId"
        [disabled]="schoolRooms.length === 0"
      >
        <mat-option value="">Select a room</mat-option>
        <mat-option *ngFor="let r of schoolRooms" [value]="r.id">
          {{ r.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Fees -->
    <mat-form-field appearance="fill">
      <mat-label>School Fee</mat-label>
      <mat-select formControlName="feeId" [disabled]="schololFees.length === 0">
        <mat-option value="">Select a fee</mat-option>
        <mat-option *ngFor="let f of schololFees" [value]="f.id">
          {{ f.name }} — {{ f.fee | currency : "GBP" : "symbol" }}/term
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Notes -->
    <mat-form-field appearance="fill">
      <mat-label>School Note</mat-label>
      <mat-select formControlName="note" [disabled]="schoolNotes.length === 0">
        <mat-option value="">Select a note</mat-option>
        <mat-option *ngFor="let n of schoolNotes" [value]="n">
          {{ n.notes }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </form>

  <div class="actions">
    <button
      mat-raised-button
      color="primary"
      (click)="submit()"
      [disabled]="schoolForm.invalid"
    >
      Save
    </button>
    <button mat-button (click)="reset()">Reset</button>
  </div>

  <pre>{{ schoolForm.value | json }}</pre>
</div>
