<div>设置学校</div>
<form
  [formGroup]="schoolForm"
  (ngSubmit)="submit()"
  style="max-width: 400px; margin: 50px auto"
>
  <mat-form-field appearance="fill" style="width: 100%">
    <mat-label>学校名字</mat-label>
    <input matInput placeholder="Enter school name" formControlName="school" />
  </mat-form-field>

  <mat-form-field appearance="fill" style="width: 100%">
    <mat-label>价格日期</mat-label>
    <input
      matInput
      [matDatepicker]="picker"
      placeholder="Select date"
      formControlName="date"
    />
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>

  <button
    mat-raised-button
    color="primary"
    type="submit"
    [disabled]="schoolForm.invalid"
  >
    Submit
  </button>
</form>

<mat-divider class="my-10"></mat-divider>

<div style="max-width: 900px; margin: 0 auto">
  <div
    style="display: flex; align-items: center; gap: 16px; margin-bottom: 12px"
  >
    <h3 style="margin: 0">学校列表</h3>

    <mat-form-field
      appearance="outline"
      style="margin-left: auto; width: 260px"
    >
      <mat-label>搜索学校</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="输入学校名…" />
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="dataSource" matSort matSortDisableClear>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>学校名字</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <ng-container matColumnDef="createdDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>价格日期</th>
      <td mat-cell *matCellDef="let row">
        {{ row.createdDate | date : "yyyy-MM-dd" }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>操作</th>
      <td mat-cell *matCellDef="let row">
        <button mat-stroked-button color="primary" (click)="edit(row)">
          编辑
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5, 10, 25, 50]"
    showFirstLastButtons
  >
  </mat-paginator>
</div>
