<header class="site-header">
  <a
    class="brand"
    routerLink="/"
    aria-label="思达启航教育 SIDA Qihang Education"
    (click)="closeMobileMenu()"
  >
    <img
      class="brand-logo"
      src="/assets/sida-qihang-navbar-logo.jpg"
      alt="思达启航教育 SIDA Qihang Education"
    />
    <span class="brand-tagline" aria-label="留学规划，语言提升，成就未来">
      <span>留学规划 · 语言提升</span>
      <span>成就未来</span>
    </span>
  </a>

  <button
    class="menu-toggle"
    type="button"
    [attr.aria-expanded]="mobileMenuOpen"
    aria-label="切换导航"
    (click)="toggleMobileMenu()"
  >
    <mat-icon>{{ mobileMenuOpen ? "close" : "menu" }}</mat-icon>
  </button>

  <nav
    class="primary-nav"
    [class.primary-nav--open]="mobileMenuOpen"
    [class.primary-nav--suppressed]="megaMenuSuppressed"
    (mouseleave)="allowMegaMenu()"
    aria-label="主导航"
  >
    <div class="nav-item" *ngFor="let item of navItems; trackBy: trackById">
      <a class="nav-link" [routerLink]="item.route" (click)="closeMenus()">
        <span>{{ item.label }}</span>
        <mat-icon *ngIf="item.children?.length">expand_more</mat-icon>
      </a>

      <div class="mega-menu" *ngIf="item.children?.length">
        <div class="mega-menu__intro">
          <span>STAR Education</span>
          <strong>{{ item.label }}</strong>
          <p>{{ item.note || "完整项目路径与申请资讯" }}</p>
          <a routerLink="/about-sida/contact" (click)="closeMenus()">
            免费咨询
            <mat-icon>chevron_right</mat-icon>
          </a>
        </div>

        <div class="mega-menu__columns">
          <section
            class="mega-group"
            *ngFor="let child of item.children; trackBy: trackById"
          >
            <a
              class="mega-group__title"
              [routerLink]="child.route"
              (click)="closeMenus()"
            >
              {{ child.label }}
            </a>

            <div class="mega-subitems" *ngIf="child.children?.length">
              <a
                *ngFor="let subitem of child.children; trackBy: trackById"
                [routerLink]="subitem.route"
                (click)="closeMenus()"
              >
                {{ subitem.label }}
              </a>
            </div>
          </section>
        </div>
      </div>
    </div>
  </nav>

  <a class="consult-button" routerLink="/about-sida/contact" (click)="closeMenus()">
    <mat-icon>chat_bubble</mat-icon>
    <span>免费咨询</span>
  </a>
</header>
